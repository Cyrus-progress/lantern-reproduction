name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # Fast subset: the tests use only the deterministic models (kNN/SVR/RF),
      # so we skip the heavy torch/lightgbm installs and the 10-seed sweeps.
      - name: Install (fast test subset)
        run: |
          python -m pip install --upgrade pip
          pip install "numpy==1.26.4" pandas scikit-learn scipy matplotlib rdkit pytest

      - name: Run tests
        run: pytest -q
